name: Contract
on:
  push: { branches: [main] }
  pull_request:

jobs:
  contract:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: unerp
          POSTGRES_PASSWORD: unerp_password
          POSTGRES_DB: unierp_healthcare
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://unerp:unerp_password@localhost:5432/unierp_healthcare?schema=public
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: pnpm install
      - run: npx prisma generate && npx prisma migrate deploy
      - run: npx tsc
      - run: node test/contract.mjs
